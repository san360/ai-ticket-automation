name: Deploy Infrastructure & Agents

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'agents/**'
      - 'scripts/**'
      - 'evaluation/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      ai_foundry_endpoint: ${{ steps.provision.outputs.AI_FOUNDRY_ENDPOINT }}
      ai_project_name: ${{ steps.provision.outputs.AI_PROJECT_NAME }}
      resource_group: ${{ steps.provision.outputs.AZURE_RESOURCE_GROUP }}
      logic_app_name: ${{ steps.provision.outputs.LOGIC_APP_NAME }}
      container_app_url: ${{ steps.provision.outputs.CONTAINER_APP_URL }}
      container_registry_name: ${{ steps.provision.outputs.CONTAINER_REGISTRY_NAME }}
      container_registry_login_server: ${{ steps.provision.outputs.CONTAINER_REGISTRY_LOGIN_SERVER }}

    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ vars.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Provision Infrastructure
        id: provision
        run: |
          azd provision --no-prompt
          echo "AI_FOUNDRY_ENDPOINT=$(azd env get-value AI_FOUNDRY_ENDPOINT)" >> $GITHUB_OUTPUT
          echo "AI_PROJECT_NAME=$(azd env get-value AI_PROJECT_NAME)" >> $GITHUB_OUTPUT
          echo "AZURE_RESOURCE_GROUP=$(azd env get-value AZURE_RESOURCE_GROUP)" >> $GITHUB_OUTPUT
          echo "LOGIC_APP_NAME=$(azd env get-value LOGIC_APP_NAME)" >> $GITHUB_OUTPUT
          echo "CONTAINER_APP_URL=$(azd env get-value CONTAINER_APP_URL)" >> $GITHUB_OUTPUT
          echo "CONTAINER_REGISTRY_NAME=$(azd env get-value CONTAINER_REGISTRY_NAME)" >> $GITHUB_OUTPUT
          echo "CONTAINER_REGISTRY_LOGIN_SERVER=$(azd env get-value CONTAINER_REGISTRY_LOGIN_SERVER)" >> $GITHUB_OUTPUT

  deploy-agents:
    name: Deploy Foundry Agents
    runs-on: ubuntu-latest
    needs: deploy-infra
    env:
      AI_FOUNDRY_ENDPOINT: ${{ needs.deploy-infra.outputs.ai_foundry_endpoint }}
      AI_PROJECT_NAME: ${{ needs.deploy-infra.outputs.ai_project_name }}
      GPT_DEPLOYMENT: ${{ vars.GPT_DEPLOYMENT || 'gpt-4.1-mini' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Deploy Agents
        run: python scripts/deploy-agents.py

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: agent-deployment-outputs
          path: scripts/deployment-outputs.env

  deploy-app:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [deploy-infra, deploy-agents]

    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure
        run: |
          azd auth login `
            --client-id "${{ vars.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Build and Push ServiceDesk Simulator Image
        run: |
          az acr login --name ${{ needs.deploy-infra.outputs.container_registry_name }}
          docker build -t ${{ needs.deploy-infra.outputs.container_registry_login_server }}/servicedesk-simulator:${{ github.sha }} \
            -t ${{ needs.deploy-infra.outputs.container_registry_login_server }}/servicedesk-simulator:latest \
            src/servicedesk-simulator/
          docker push ${{ needs.deploy-infra.outputs.container_registry_login_server }}/servicedesk-simulator:${{ github.sha }}
          docker push ${{ needs.deploy-infra.outputs.container_registry_login_server }}/servicedesk-simulator:latest

      - name: Update Container App Image
        run: |
          az containerapp update \
            --name $(azd env get-value CONTAINER_APP_NAME 2>/dev/null || echo "") \
            --resource-group ${{ needs.deploy-infra.outputs.resource_group }} \
            --image ${{ needs.deploy-infra.outputs.container_registry_login_server }}/servicedesk-simulator:${{ github.sha }}

      - name: Download agent outputs
        uses: actions/download-artifact@v4
        with:
          name: agent-deployment-outputs

      - name: Configure Logic App
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Logic App Settings
        run: |
          source deployment-outputs.env
          az webapp config appsettings set \
            --name "${{ needs.deploy-infra.outputs.logic_app_name }}" \
            --resource-group "${{ needs.deploy-infra.outputs.resource_group }}" \
            --settings \
              "CLASSIFIER_AGENT_ID=$CLASSIFIER_AGENT_ID" \
              "MESSAGE_AGENT_ID=$MESSAGE_AGENT_ID" \
              "SERVICEDESK_BASE_URL=${{ needs.deploy-infra.outputs.container_app_url }}"
