name: Setup Continuous Evaluation

on:
  workflow_dispatch:

env:
  FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
  GPT_DEPLOYMENT: "gpt-4.1-mini"

jobs:
  setup:
    name: Configure Continuous Evaluation Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install azure-ai-projects azure-identity openai

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup continuous evaluation
        run: python scripts/run_evaluation.py
