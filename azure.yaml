name: ai-ticket-automation
metadata:
  template: ai-ticket-automation@0.0.1
services:
  servicedesk-simulator:
    project: ./src/servicedesk-simulator
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      remoteBuild: true
      registry: ${CONTAINER_REGISTRY_LOGIN_SERVER}
hooks:
  postdeploy:
    shell: pwsh
    run: ./scripts/post-provision.ps1
    interactive: true
    continueOnError: false
